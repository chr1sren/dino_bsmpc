defaults:
  - _self_

# Local ManiSkill planning (no SLURM/submitit).
# Checkpoints are loaded from:
#   ${ckpt_base_path}/outputs/${model_name}/checkpoints/model_${model_epoch}.pth
#
# Example (from dino_bsmpc/):
#   export WANDB_MODE=disabled
#   python plan.py --config-name plan_maniskill.yaml \
#     model_name=pushcube_comparison/bisim_baseline/seed_0 \
#     debug_dset_init=true n_evals=1
#
# Relative ckpt_base_path=. is resolved against the launch cwd (not Hydra's run dir).

hydra:
  run:
    dir: plan_outputs/${now:%Y%m%d%H%M%S}_${replace_slash:${model_name}}_gH${goal_H}
  sweep:
    dir: plan_outputs/${now:%Y%m%d%H%M%S}_${replace_slash:${model_name}}_gH${goal_H}
    subdir: ${hydra.job.num}

ckpt_base_path: .   # repo root that contains outputs/ (relative to launch cwd)
model_name: null
model_epoch: latest

seed: 99
n_evals: 1
# dset: sample init/goal from val trajectories (recommended for ManiSkill)
# random_state: sample random env resets (harder; goal site is episode-specific)
goal_source: dset
goal_H: 5
n_plot_samples: 1
debug_dset_init: False
# ManiSkill env_info only has episode-start sim_state — keep offsets at 0 unless
# you also set warmup_actions (plan.py can build them when dset_start_only=false).
dset_start_only: true
# place_site: ManiSkill task success (cube → red goal). Needs long enough goal_H
#   that the dset segment actually reaches the site — else even GT gets SR=0.
# goal_state: success if cube matches state_g (fair for short-horizon CEM).
success_mode: goal_state
success_thresh: 0.025

objective:
  _target_: planning.objectives.create_objective_fn
  # Push/Pick success is object placement; heavy proprio matching makes CEM chase
  # the demo arm pose and ignore the cube. Prefer visual (alpha small).
  alpha: 0.1
  base: 2
  mode: last

planner:
  _target_: planning.mpc.MPCPlanner
  max_iter: 10   # hard stop; null = loop forever until success (dangerous when SR=0)
  n_taken_actions: 5
  sub_planner:
    target: planning.cem.CEMPlanner
    horizon: 5
    topk: 30
    num_samples: 300
    var_scale: 1
    opt_steps: 30
    eval_every: 1
  name: mpc_cem
